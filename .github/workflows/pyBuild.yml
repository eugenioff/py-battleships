name: pyBuild
on:
  push: 
    branches: 
      - main
    paths:
      - "battleship-authorizer/**"
      - "battleship-game/**"

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      game: ${{ steps.filter.outputs.game }}

    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'battleship-authorizer/**'
            game:
              - 'battleship-game/**'

  build-auth:
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./battleship-authorizer
          push: true
          tags: ghcr.io/eugenioff/ms-auth:latest

  build-game:
    needs: changes 
    if: needs.changes.outputs.game == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./battleship-game
          push: true
          tags: ghcr.io/eugenioff/ms-game:latest
